name: apm-publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Validate APM manifest
        shell: pwsh
        run: ./rag/apm/Validate-ApmManifest.ps1 -ManifestPath ./rag/apm/package.manifest.json

      - name: Extract package version
        id: version
        shell: pwsh
        run: |
          $manifest = Get-Content ./rag/apm/package.manifest.json -Raw | ConvertFrom-Json
          $version = [string]$manifest.package.version
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "package.version is missing from rag/apm/package.manifest.json"
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Verify git tag matches manifest version
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $expectedTag = "refs/tags/${{ steps.version.outputs.tag }}"
          if ("${{ github.ref }}" -ne $expectedTag) {
            throw "Tag ${{ github.ref }} does not match manifest version $expectedTag"
          }

      - name: Publish MCP server (Release)
        run: dotnet publish ./rag/src/Rag.McpServer/Rag.McpServer.csproj -c Release -o ./artifacts/mcp-server

      - name: Assemble APM package directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./artifacts/apm-package | Out-Null
          Copy-Item ./rag/apm/package.manifest.json ./artifacts/apm-package/package.manifest.json
          Copy-Item ./rag/apm/package.manifest.schema.json ./artifacts/apm-package/package.manifest.schema.json
          Copy-Item ./rag/apm/CHANGELOG.md ./artifacts/apm-package/CHANGELOG.md
          Copy-Item ./rag/apm/Validate-ApmManifest.ps1 ./artifacts/apm-package/Validate-ApmManifest.ps1
          Copy-Item ./README.md ./artifacts/apm-package/README.md

          New-Item -ItemType Directory -Force -Path ./artifacts/apm-package/mcp-server | Out-Null
          Copy-Item ./artifacts/mcp-server/* ./artifacts/apm-package/mcp-server -Recurse

      - name: Create versioned archive
        shell: pwsh
        run: |
          $archiveName = "rag-mcp-server-apm-${{ steps.version.outputs.version }}.zip"
          Compress-Archive -Path ./artifacts/apm-package/* -DestinationPath "./artifacts/$archiveName" -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: rag-mcp-server-apm-${{ steps.version.outputs.version }}
          path: ./artifacts/rag-mcp-server-apm-${{ steps.version.outputs.version }}.zip

      - name: Publish GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: rag-mcp-server-apm ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ./artifacts/rag-mcp-server-apm-${{ steps.version.outputs.version }}.zip
